# Server
server.port=8080

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/chatdb
spring.datasource.username=${USER}
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT (HS384 requires at least 384 bits = 48 bytes)
jwt.secret=your-very-long-secret-key-change-this-in-production-minimum-384-bits-for-hs384-algorithm
jwt.expiration=86400000

# Encryption (must be exactly 32 bytes for AES-256)
encryption.key=12345678901234567890123456789012

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload.dir=${user.home}/Chat/uploads

